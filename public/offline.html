<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Sem conexão — Chosen</title>
<link rel="icon" href="/favicon.ico" />
<style>
  :root { color-scheme: light dark; }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: #f6f4ee;
    color: #1a1a1a;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    -webkit-font-smoothing: antialiased;
  }
  .card {
    max-width: 360px;
    width: 100%;
    text-align: center;
  }
  .icon {
    width: 72px;
    height: 72px;
    margin: 0 auto 20px;
    border-radius: 50%;
    background: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 4px 20px rgba(0,0,0,0.06);
  }
  .icon svg { width: 36px; height: 36px; stroke: #1a1a1a; }
  h1 { font-size: 20px; font-weight: 600; margin: 0 0 8px; }
  p { font-size: 15px; line-height: 1.5; color: #555; margin: 0 0 24px; }
  button {
    background: #1a1a1a;
    color: #fff;
    border: 0;
    border-radius: 999px;
    padding: 12px 28px;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    font-family: inherit;
  }
  button:active { opacity: 0.85; }
  @media (prefers-color-scheme: dark) {
    body { background: #0f0f10; color: #f5f5f5; }
    .icon { background: #1c1c1e; box-shadow: none; }
    .icon svg { stroke: #f5f5f5; }
    p { color: #aaa; }
    button { background: #f5f5f5; color: #0f0f10; }
  }
</style>
</head>
<body>
  <div class="card">
    <div class="icon" aria-hidden="true">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M2 2l20 20"/>
        <path d="M8.5 16.5a5 5 0 017 0"/>
        <path d="M5 12.5a10 10 0 015.7-2.8"/>
        <path d="M19 12.5a10 10 0 00-3-2.2"/>
        <path d="M2 8.8a15 15 0 014.2-2.6"/>
        <path d="M22 8.8a15 15 0 00-9-2.7"/>
        <circle cx="12" cy="20" r="1"/>
      </svg>
    </div>
    <h1>Sem conexão com a internet</h1>
    <p>Verifique seu Wi-Fi ou dados móveis e tente novamente.</p>
    <button type="button" onclick="location.reload()">Tentar novamente</button>
  </div>
</body>
</html>
